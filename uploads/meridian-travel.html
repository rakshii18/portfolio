  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags - manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs -
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin - blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec - re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

ol-zoom a{border-radius:6px!important;color:#1C1B19!important;}\n  .leaflet-bar{border:none!important;box-shadow:0 1px 4px rgba(0,0,0,.14)!important;}\n  .pin-wrap{background:none;border:none;}\n  .pin{position:relative;width:18px;height:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;}\n  .pin-dot{width:15px;height:15px;border-radius:50%;background:var(--accent,#CF5A3C);border:2.5px solid #fff;box-shadow:0 2px 5px rgba(0,0,0,.32);transition:transform .16s ease;}\n  .pin:hover .pin-dot{transform:scale(1.22);}\n  .pin.active .pin-dot{transform:scale(1.32);box-shadow:0 0 0 6px rgba(207,90,60,.18),0 2px 7px rgba(0,0,0,.32);}\n  .pin-tip{background:#1C1B19!important;color:#fff!important;border:none!important;border-radius:6px!important;font-size:12px!important;font-weight:600!important;padding:4px 9px!important;box-shadow:0 3px 10px rgba(0,0,0,.2)!important;}\n  .pin-tip:before{border-top-color:#1C1B19!important;}\n  .scrl::-webkit-scrollbar{width:9px;}\n  .scrl::-webkit-scrollbar-thumb{background:#DAD6CE;border-radius:9px;border:3px solid #fff;}\n  .scrl::-webkit-scrollbar-track{background:transparent;}\n  input:focus,textarea:focus{outline:none;border-color:var(--accent,#CF5A3C)!important;}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"--accent:#CF5A3C;display:flex;flex-direction:column;height:100vh;width:100%;background:#FBFAF8;color:#1C1B19;overflow:hidden;\">\n\n  <!-- HEADER -->\n  <header style=\"display:flex;align-items:center;justify-content:space-between;gap:24px;padding:0 28px;height:70px;flex:none;background:#FFFFFF;border-bottom:1px solid #EAE7E1;z-index:5;\">\n    <div style=\"display:flex;align-items:baseline;gap:14px;\">\n      <div style=\"font-family:'Spectral',serif;font-weight:500;font-size:26px;letter-spacing:.02em;\">Meridian<\u002Fdiv>\n      <div style=\"font-size:12px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:#A9A69E;\">Travel Journal<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:22px;\">\n      <div style=\"font-size:13.5px;font-weight:500;color:#6F6E69;letter-spacing:.01em;\">{{ stats }}<\u002Fdiv>\n      <button sc-camel-on-click=\"{{ onStartAdd }}\" style=\"display:flex;align-items:center;gap:8px;background:var(--accent);color:#fff;border:none;border-radius:9px;padding:11px 17px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.08);\" style-hover=\"background:#B5482D;\">\n        <svg width=\"15\" height=\"15\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg>\n        Add place\n      <\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- BODY -->\n  <div style=\"display:flex;flex:1;min-height:0;\">\n\n    <!-- SIDEBAR -->\n    <aside style=\"width:392px;flex:none;background:#FFFFFF;border-right:1px solid #EAE7E1;display:flex;flex-direction:column;min-height:0;\">\n\n      <!-- LIST -->\n      <sc-if value=\"{{ showList }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex;flex-direction:column;min-height:0;flex:1;\">\n          <div style=\"padding:22px 24px 14px;flex:none;\">\n            <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;\">\n              <h2 style=\"margin:0;font-family:'Spectral',serif;font-weight:500;font-size:21px;\">Your journeys<\u002Fh2>\n              <span style=\"font-size:13px;color:#A9A69E;font-weight:600;\">{{ placesCount }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"position:relative;\">\n              <svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#A9A69E\" stroke-width=\"2\" style=\"position:absolute;left:13px;top:50%;transform:translateY(-50%);\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"m21 21-4.3-4.3\"><\u002Fpath><\u002Fsvg>\n              <input value=\"{{ se fy-content:center;cursor:pointer;\">\n                      <svg width=\"11\" height=\"11\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.6\" stroke-linecap=\"round\"><path d=\"M18 6 6 18M6 6l12 12\"><\u002Fpath><\u002Fsvg>\n                    <\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n                <label style=\"aspect-ratio:1;border:1.5px dashed #D8D3C9;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;color:#A9A69E;background:#FBFAF8;\" style-hover=\"border-color:var(--accent);color:var(--accent);\">\n                  <svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg>\n                  <span style=\"font-size:10px;font-weight:600;\">Add<\u002Fspan>\n                  <input type=\"file\" accept=\"image/*\" multiple=\"\" sc-camel-on-change=\"{{ onAddPhotos }}\" style=\"display:none\">\n                <\u002Flabel>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:10px;padding:14px 22px;border-top:1px solid #F0EDE7;flex:none;background:#fff;\">\n            <button sc-camel-on-click=\"{{ onCancelForm }}\" style=\"flex:none;padding:12px 18px;border:1px solid #EAE7E1;background:#fff;border-radius:9px;font-family:inherit;font-size:14px;font-weight:600;color:#6F6E69;cursor:pointer;\">Cancel<\u002Fbutton>\n            <button sc-camel-on-click=\"{{ onSave }}\" disabled=\"{{ saveDisabled }}\" style=\"{{ saveBtnStyle }}\">{{ saveLabel }}<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Faside>\n\n    <!-- MAP -->\n    <div style=\"position:relative;flex:1;min-width:0;background:#EEEAE3;\">\n      <div ref=\"{{ mapRef }}\" style=\"position:absolute;inset:0;\"><\u002Fdiv .props.mapStyle || 'Light';\n    if (want === this._appliedStyle) return;\n    this._appliedStyle = want;\n    if (this.tile) this.map.removeLayer(this.tile);\n    this.tile = window.L.tileLayer(this.tileUrl(), { subdomains: 'abcd', maxZoom: 19, attribution: '© OpenStreetMap, © CARTO' }).addTo(this.map);\n    if (this.tile.bringToBack) this.tile.bringToBack();\n  }\n\n  activeId() {\n    if (this.state.mode === 'form' && this.state.formMode === 'edit' && this.state.draft) return this.state.draft.id;\n    return this.state.selectedId;\n  }\n\n  renderMarkers() {\n    if (!this.map || !window.L) return;\n    const L = window.L;\n    this.markers = this.markers || {};\n    const ids = new Set(this.state.entries.map(e => e.id));\n    Object.keys(this.markers).forEach(id => { if (!ids.has(id)) { this.map.removeLayer(this.markers[id]); delete this.markers[id]; } });\n    const activeId = this.activeId();\n    this.state.entries.forEach(e => {\n      const active = e.id === activeId;\n      const icon = L.divIcon({ className: 'pin-wrap', html: `<div class=\"pin${active ? ' active' : ''}\"><span class=\"pin-dot\"><\u002Fspan><\u002Fdiv>`, iconSize: [18, 18], iconAnchor: [9, 9] });\n      if (this.markers[e.id]) { this.markers[e.id].setLatLng([e.lat, e.lng]).setIcon(icon); }\n      else {\n        const m = L.marker([e.lat, e.lng], { icon }).addTo(this.map);\n        m.bindTooltip(e.name, { direction: 'top', offset: [0, -11], className: 'pin-tip', opacity: 1 });\n        m.on('click', () => this.selectEntry(e.id));\n        this.markers[e.id] = m;\n      }\n    });\n  }\n\n  updateDraftMarker() {\n    if (!this.map || !window.L) return;\n    const L = window.L;\n    if (this.draftMarker) { this.map.removeLayer(this.draftMarker); this.draftMarker = null; }\n    const d = this.state.draft;\n    if (this.state.mode === 'form' && this.state.formMode === 'add' && d && d.lat != null) {\n      const icon = L.divIcon({ className: 'pin-wrap', html: '<div class=\"pin active\"><span class=\"pin-dot\"><\u002Fspan><\u002Fdiv>', iconSize: [18, 18], iconAnchor: [9, 9] });\n      this.draftMarker = L.marker([d.lat, d.lng], { icon }).addTo(this.map);\n    }\n  }\n\n  updateRoute() {\n    if (!this.map || !window.L) return;\n    if (this.route) { this.map.removeLayer(this.route); this.route = null; }\n    if (!this.props.showRoutes) return;\n    const sorted = [...this.state.entries].filter(e => e.start).sort((a, b) => a.start.localeCompare(b.start));\n    if (sorted.length < 2) return;\n    const accent = getComputedStyle(this.mapEl).getPropertyValue('--accent') || '#CF5A3C';\n    this.route = window.L.polyline(sorted.map(e => [e.lat, e.lng]), { color: accent.trim() || '#CF5A3C', weight: 2, opacity: 0.7, dashArray: '2 7', lineCap: 'round' }).addTo(this.map);\n    if (this.route.bringToBack) this.route.bringToBack();\n  }\n\n  flyTo(lat, lng, z) { if (this.map) this.map.flyTo([lat, lng], z || 5, { duration: 0.8 }); }\n  fitAll() {\n    if (!this.map || !window.L) return;\n    const es = this.state.entries;\n    if (!es.length) return;\n    const b = window.L.latLngBounds(es.map(e => [e.lat, e.lng]));\n    this.map.fitBounds(b.pad(0.28), { maxZoom: 4, animate: false });\n  }\n\n  // ---------- selection / nav ----------\n  selectEntry = (id) => {\n    const e = this.state.entries.find(x => x.id === id);\n    this.setState({ selectedId: id, mode: 'view', placing: false, confirmingDelete: false, draft: null });\n    if (e) this.flyTo(e.lat, e.lng, 5);\n  };\n  onBack = () => this.setState({ mode: 'list', selectedId: null, confirmingDelete: false });\n  onStartAdd = () => {\n    const draft = { id: null, name: '', location: '', country: '', lat: null, lng: null, start: '', end: '', description: '', tags: [], companions: '', photos: [], hue: Math.floor(Math.random() * 360) };\n    this.setState({ draft, mode: 'form', formMode: 'add', placing: false, selectedId: null, confirmingDelete: false, geoStatus: '' });\n  };\n  onCancelPlacing = () => this.setState({ placing: false });\n\n  onEdit = () => {\n    const e = this.selected();\n    if (e) this.setState({ draft: { ...e, tags: [...(e.tags || [])], photos: [...(e.photos || [])] }, mode: 'form', formMode: 'edit', confirmingDelete: false });\n  };\n  onPickLocation = () => this.setState({ placing: true, geoStatus: '' });\n\n  onFindLocation = () => {\n    const d = this.state.draft || {};\n    const q = (d.location || d.name || '').trim();\n    if (!q) { this.setState({ geoStatus: 'err:Type a place or location first' }); return; }\n    this.setState({ geoStatus: 'wait:Searching…' });\n    this.forwardGeocode(q).then(info => {\n      if (!info) { this.setState({ geoStatus: 'err:Couldn’t find that - try “Pick on map” instead' }); return; }\n      this.setState(s => s.draft ? ({ draft: { ...s.draft, lat: info.lat, lng: info.lng, location: s.draft.location || info.location, country: s.draft.country || info.country }, geoStatus: '' }) : {}, () => this.flyTo(info.lat, info.lng, 5));\n    });\n  };\n\n  async forwardGeocode(q) {\n    try {\n      const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(q)}`, { headers: { Accept: 'application/json' } });\n      const j = await r.json();\n      if (!j || !j.length) return null;\n      const hit = j[0];\n      const country = (hit.display_name || '').split(',').pop().trim();\n      return { lat: parseFloat(hit.lat), lng: parseFloat(hit.lon), location: hit.display_name ? hit.display_name.split(',').slice(0, 2).join(', ').trim() : q, country };\n    } catch (e) { return null; }\n  }\n\n  onAskDelete = () => this.setState({ confirmingDelete: true });\n  onCancelDelete = () => this.setState({ confirmingDelete: false });\n  onConfirmDelete = () => {\n    const id = this.state.selectedId;\n    const entries = this.state.entries.filter(e => e.id !== id);\n    this.persist(entries);\n    this.setState({ entries, mode: 'list', selectedId: null, confirmingDelete: false }, () => this.fitAll());\n  };\n\n  // ---------- map picking ----------\n  handleMapPick(lat, lng) {\n    if (this.state.mode === 'form' && this.state.draft) {\n      this.setState({ draft: { ...this.state.draft, lat, lng }, placing: false }, () => this.afterPick(lat, lng));\n    } else {\n      const draft = { id: null, name: '', location: '', country: '', lat, lng, start: '', end: '', description: '', tags: [], companions: '', photos: [], hue: Math.floor(Math.random() * 360) };\n      this.setState({ draft, mode: 'form', formMode: 'add', placing: false, selectedId: null }, () => this.afterPick(lat, lng));\n    }\n  }\n  afterPick(lat, lng) {\n    this.flyTo(lat, lng, Math.max(this.map ? this.map.getZoom() : 4, 4));\n    this.reverseGeocode(lat, lng).then(info => {\n      if (!info) return;\n      this.setState(s => s.draft ? ({ draft: { ...s.draft, location: s.draft.location || info.location, name: s.draft.name || info.name, country: s.draft.country || info.country } }) : {});\n    });\n  }\n  async reverseGeocode(lat, lng) {\n    try {\n      const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&zoom=10&lat=${lat}&lon=${lng}`, { headers: { Accept: 'application/json' } });\n      const j = await r.json();\n      const a = j.address || {};\n      const place = a.city || a.town || a.village || a.state || a.county || a.island || '';\n      const country = a.country || '';\n      return { location: [place, country].filter(Boolean).join(', '), country, name: place };\n    } catch (e) { return null; }\n  }\n\n  // ---------- form field setters ----------\n  setDraft(k, v) { this.setState(s => ({ draft: { ...s.draft, [k]: v } })); }\n  onName = (e) => this.setDraft('name', e.target.value);\n  onLocation = (e) => this.setDraft('location', e.target.value);\n  onStart = (e) => this.setDraft('start', e.target.value);\n  onEnd = (e) => this.setDraft('end', e.target.value);\n  onDesc = (e) => this.setDraft('description', e.target.value);\n  onCompanions = (e) => this.setDraft('companions', e.target.value);\n  toggleTag(tag) {\n    this.setState(s => {\n      const has = (s.draft.tags || []).includes(tag);\n      return { draft: { ...s.draft, tags: has ? s.draft.tags.filter(t => t !== tag) : [...(s.draft.tags || []), tag] } };\n    });\n  }\n  onSearch = (e) => this.setState({ search: e.target.value });\n  toggleFilter(tag) { this.setState(s => ({ filter: s.filter === tag ? null : tag })); }\n\n  onAddPhotos = (e) => {\n    const files = [...(e.target.files || [])];\n    if (!files.length) return;\n    Promise.all(files.map(f => this.resizeImage(f))).then(urls => {\n      const ok = urls.filter(Boolean);\n      this.setState(s => ({ draft: { ...s.draft, photos: [...(s.draft.photos || []), ...ok] } }));\n    });\n    e.target.value = '';\n  };\n  removePhoto(i) { this.setState(s => ({ draft: { ...s.draft, photos: s.draft.photos.filter((_, idx) => idx !== i) } })); }\n  resizeImage(file) {\n    return new Promise(res => {\n      const reader = new FileReader();\n      reader.onload = () => {\n        const img = new Image();\n        img.onload = () => {\n          const max = 1280; let w = img.width, h = img.height;\n          if (w > h && w > max) { h = Math.round(h * max / w); w = max; }\n          else if (h > max) { w = Math.round(w * max / h); h = max; }\n          const c = document.createElement('canvas'); c.width = w; c.height = h;\n          c.getContext('2d').drawImage(img, 0, 0, w, h);\n          try { res(c.toDataURL('image/jpeg', 0.82)); } catch (e) { res(null); }\n        };\n        img.onerror = () => res(null);\n        img.src = reader.result;\n      };\n      reader.onerror = () => res(null);\n      reader.readAsDataURL(file);\n    });\n  }\n\n  // ---------- save / cancel ----------\n  canSave() { const d = this.state.draft; return !!(d && d.name && d.name.trim() && ((d.location && d.location.trim()) || d.lat != null)); }\n  onSave = async () => {\n    if (!this.canSave()) return;\n    let d = this.state.draft;\n    if (d.lat == null) {\n      this.setState({ geoStatus: 'wait:Locating…' });\n      const info = await this.forwardGeocode((d.location || d.name).trim());\n      if (!info) { this.setState({ geoStatus: 'err:Couldn’t locate that place - use “Pick on map” to set it' }); return; }\n      d = { ...d, lat: info.lat, lng: info.lng, location: d.location || info.location, country: d.country || info.country };\n    }\n    let id = d.id, entries;\n    if (this.state.formMode === 'add') {\n      id = 'e' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);\n      entries = [...this.state.entries, { ...d, id }];\n    } else {\n      entries = this.state.entries.map(e => e.id === d.id ? { ...d } : e);\n    }\n    this.persist(entries);\n    this.setState({ entries, mode: 'view', selectedId: id, draft: null, placing: false, geoStatus: '' });\n    this.flyTo(d.lat, d.lng, 5);\n  };\n  onCancelForm = () => {\n    const back = this.state.formMode === 'edit' && this.state.draft && this.state.draft.id;\n    this.setState({ mode: back ? 'view' : 'list', selectedId: back ? this.state.draft.id : null, draft: null, placing: false });\n  };\n\n  // ---------- storage ----------\n  persist(entries) { try { localStorage.setItem(this.KEY, JSON.stringify(entries)); } catch (e) {} }\n  load() { try { const r = localStorage.getItem(this.KEY); if (r) return JSON.parse(r); } catch (e) {} return null; }\n\n  // ---------- helpers ----------\n  selected() { return this.state.entries.find(e => e.id === this.state.selectedId); }\n  gradient(hue) { return `linear-gradient(140deg, hsl(${hue} 52% 64%), hsl(${(hue + 38) % 360} 48% 46%))`; }\n  hueFor(e) { return e.hue != null ? e.hue : ((e.id || '').split('').reduce((a, c) => a + c.charCodeAt(0), 0) * 17) % 360; }\n  fmtRange(start, end) {\n    if (!start) return 'No dates';\n    const s = new Date(start + 'T00:00'); const e = end ? new Date(end + 'T00:00') : null;\n    const mon = d => d.toLocaleString('en-US', { month: 'short' });\n    i
